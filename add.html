<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titu Movies - Live Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* Premium Dark Cinematic Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #040407;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #FFD700;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #00E676;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .control-panel {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1C1C1E;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #00E676;
        }
        button {
            background-color: #E50914;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        button:hover {
            background-color: #B20710;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .movie-card {
            background-color: #1C1C1E;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.05);
            border-color: #FFD700;
        }
        .movie-card img {
            width: 100%;
            border-radius: 8px;
            height: 250px;
            object-fit: cover;
        }
        .movie-card h4 {
            margin: 10px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .upload-btn {
            width: 100%; 
            padding: 8px; 
            font-size: 13px;
            background-color: #00E676;
            color: #000;
        }
        .upload-btn:hover {
            background-color: #00C853;
        }
    </style>
</head>
<body>

    <h1>🎬 TITU MOVIES ADMIN</h1>
    <p class="subtitle">Live Database Connection Active</p>

    <div class="control-panel">
        <input type="text" id="searchInput" placeholder="Search Movie Name (e.g. Pushpa)..." style="width: 300px;">
        
        <select id="categorySelect">
            <option value="Trending now">🔥 Trending now</option>
            <option value="Cinema">🍿 Cinema</option>
            <option value="Bollywood">🎬 Bollywood</option>
            <option value="Hot Short TV">📺 Hot Short TV</option>
            <option value="2025 Must-Watch">⭐ 2025 Must-Watch</option>
            <option value="South Indian">🌴 South Indian</option>
        </select>

        <button onclick="searchTMDB()">Search TMDb</button>
    </div>

    <div class="grid-container" id="resultsGrid">
        </div>

    <script>
        // ==========================================
        // FIREBASE SETUP (YAHAN APNI DETAILS DAALEIN)
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyBdDxTR0Rsm2cgYRr9lMZXkd0rc7VBmhZg",
  authDomain: "titu-movies.firebaseapp.com",
  projectId: "titu-movies",
  storageBucket: "titu-movies.firebasestorage.app",
  messagingSenderId: "128123629260",
  appId: "1:128123629260:web:d60babebdf14d625571c69"
};

        // Initialize Firebase & Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // TMDb API Setup
        const TMDB_API_KEY = '91eebcbca31321a0b6f7b54e6bf377b0';

        async function searchTMDB() {
            const query = document.getElementById('searchInput').value;
            if (!query) {
                alert("Please enter a movie name!");
                return;
            }

            const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=en-US&page=1`;
            
            document.getElementById('resultsGrid').innerHTML = '<p style="text-align:center; width:100%;">Searching...</p>';

            try {
                const response = await fetch(url);
                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Failed to fetch data from TMDb.");
            }
        }

        function displayResults(movies) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = ''; 

            if (movies.length === 0) {
                grid.innerHTML = '<p style="color: #AAA; text-align:center; width: 100%;">No movies found.</p>';
                return;
            }

            movies.forEach(movie => {
                if (!movie.poster_path) return; // Bina poster wali movies ignore karein

                const posterUrl = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                const movieDataStr = JSON.stringify(movie).replace(/'/g, "\\'").replace(/"/g, '&quot;');

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${posterUrl}" alt="Poster">
                    <h4>${movie.title}</h4>
                    <p style="color: #888; font-size: 12px;">Year: ${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</p>
                    <button class="upload-btn" onclick="uploadToFirebase('${movieDataStr}', this)">Cloud Upload ☁️</button>
                `;
                grid.appendChild(card);
            });
        }

        async function uploadToFirebase(movieString, buttonElement) {
            buttonElement.innerText = "Uploading...";
            buttonElement.style.backgroundColor = "#FFD700"; // Gold
            buttonElement.disabled = true;

            const movie = JSON.parse(movieString.replace(/&quot;/g, '"'));
            const selectedCategory = document.getElementById('categorySelect').value;

            // Android app ke format me data structure karna
            const appMovieFormat = {
                tmdb_id: movie.id,
                title: movie.title,
                category: selectedCategory,
                poster_url: `https://image.tmdb.org/t/p/w500${movie.poster_path}`,
                backdrop_url: movie.backdrop_path ? `https://image.tmdb.org/t/p/w780${movie.backdrop_path}` : null,
                release_year: movie.release_date ? movie.release_date.split('-')[0] : "",
                rating: movie.vote_average.toFixed(1),
                language: movie.original_language === 'hi' ? 'Hindi' : 'English',
                description: movie.overview,
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // Latest movie pehle dikhane ke liye
            };

            try {
                // 'movies' naam ke collection me data save karna
                await db.collection("movies").add(appMovieFormat);
                
                buttonElement.innerText = "Uploaded ✅";
                buttonElement.style.backgroundColor = "#333";
                buttonElement.style.color = "#00E676";
            } catch (error) {
                console.error("Firebase Error: ", error);
                alert("Upload failed! Check console for errors.");
                buttonElement.innerText = "Cloud Upload ☁️";
                buttonElement.style.backgroundColor = "#00E676";
                buttonElement.disabled = false;
            }
        }
    </script>
</body>
</html>
